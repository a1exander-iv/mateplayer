name: mateplayer 
base: core22
version: git 
summary: Simple Material music player
icon: snap/gui/mateplayer.png
description: |
  It is a local music player in a material design. 
  Add a folder with your audio files and start listening.

grade: stable 
confinement: strict 

apps:
  mateplayer:
    command-chain:
      - bin/graphics-core22-wrapper
    command: mate_player
    common-id: app.oss.mateplayer
    extensions: [gnome] 
    slots:
      - dbus-mateplayer
    plugs:
      - audio-playback
      - home
      - desktop
      - desktop-launch
      - desktop-legacy
      - x11
      - wayland
      - opengl
      - pulseaudio
    desktop: snap/gui/mateplayer.desktop

slots:
  dbus-mateplayer: 
    interface: dbus
    bus: session
    name: app.oss.mateplayer

parts:
  mateplayer:
    build-packages: [libgstreamer1.0-dev, libgstreamer-plugins-base1.0-dev, libgtk-3-dev]
    stage-packages: [libgtk-3-0, ibus-gtk3, libpulse0]
    source: .
    plugin: flutter
    flutter-target: lib/main.dart

  graphics-core22:
    after: [mateplayer]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/graphics-core22-cleanup mesa-core22 nvidia-core22
      # Workaround for https://bugs.launchpad.net/snapd/+bug/2055273
      mkdir -p "${CRAFT_PRIME}/graphics"
    prime:
      - bin/graphics-core22-wrapper

plugs:
  graphics-core22:
    interface: content
    target: $SNAP/graphics
    default-provider: mesa-core22

layout:
  /usr/share/libdrm:
    bind: $SNAP/graphics/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/graphics/drirc.d
  /usr/share/X11/XErrorDB:
    symlink: $SNAP/graphics/X11/XErrorDB
  /usr/share/X11/locale:
    symlink: $SNAP/graphics/X11/locale